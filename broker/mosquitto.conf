# Zapisuj stan brokera (np. wiadomości typu "retained")
persistence true
persistence_location /mosquitto/data/

# Włącz logowanie do konsoli, żeby Docker je widział
log_dest stdout

# Zezwól na łączenie się anonimowych użytkowników.
# Ustawione PRZED listenerami => obowiązuje globalnie dla obu.
allow_anonymous true

# --- Listener wewnętrzny (plaintext, 1883) ---
# Tylko dla usług w sieci Docker (ingestor). W docker-compose NIE jest
# publikowany na hosta, więc jest nieosiągalny spoza sieci kontenerów.
listener 1883

# --- Listener TLS (8883) ---
# Dla ESP32 i innych klientów zewnętrznych. Publikowany na host:8883.
# Klient weryfikuje tożsamość brokera certyfikatem CA (server auth);
# broker nie wymaga certyfikatu klienta (require_certificate domyślnie false).
listener 8883
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
