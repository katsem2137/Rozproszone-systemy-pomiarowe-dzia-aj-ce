services:
  flask:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - 5001:5001
    image: api:v1
    container_name: api
    depends_on:
      - database
    env_file:
      - .env
    restart: on-failure
    networks:
      - backend

  broker:
    build:
      context: ./broker
      dockerfile: Dockerfile
    # Na hosta publikujemy WYLACZNIE port TLS (8883) - dla ESP32.
    # Port 1883 NIE jest publikowany: listener 1883 dziala tylko wewnatrz
    # sieci 'backend' (dla ingestora).
    ports:
      - 8883:8883
    image: broker:v1
    container_name: broker
    volumes:
      - ./certs:/mosquitto/certs:ro
    networks:
      - backend

  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    # Brak mapowania portu 5432 na hosta - baza osiagalna tylko w sieci 'backend'.
    image: database:v1
    container_name: postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - backend

  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    image: ingestor:v1
    container_name: ingestor
    depends_on:
      - broker
      - database
    restart: on-failure
    env_file:
      - .env
    networks:
      - backend

networks:
  backend:
    driver: bridge
